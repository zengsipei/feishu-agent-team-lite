services:
  feishu-agent-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    image: feishu-agent-runtime:latest
    container_name: feishu-agent-runtime
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./config/agent-runtime-config.json:/app/config/agent-runtime-config.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
