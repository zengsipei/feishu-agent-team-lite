services:
  feishu-agent-runtime:
    build:
      context: ./feishu-agent-runtime
      dockerfile: Dockerfile
    image: feishu-agent-runtime:latest
    container_name: feishu-agent-runtime
    restart: unless-stopped
    env_file:
      - ./feishu-agent-runtime/.env
    environment:
      RUNTIME_CONFIG_PATH: /app/config/agent-runtime-config.json
      DATA_DIR: /app/data
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ./feishu-agent-runtime/data:/app/data
      - ./config/agent-runtime-config.json:/app/config/agent-runtime-config.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  feishu-channel-adapter:
    build:
      context: ./feishu-channel-adapter
      dockerfile: Dockerfile
    image: feishu-channel-adapter:latest
    container_name: feishu-channel-adapter
    restart: unless-stopped
    env_file:
      - ./feishu-channel-adapter/.env
    environment:
      RUNTIME_BASE_URL: http://feishu-agent-runtime:8080
      AGENT_RUNTIME_CONFIG_PATH: /app/config/agent-runtime-config.json
      ADAPTER_STATUS_DIR: /app/status
    depends_on:
      feishu-agent-runtime:
        condition: service_healthy
    volumes:
      - ./config/agent-runtime-config.json:/app/config/agent-runtime-config.json:ro
      - ./feishu-channel-adapter/status:/app/status
